apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: paytogether
  labels:
    app: elasticsearch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi  # Ajustable selon vos besoins
  storageClassName: standard  # ⚠️ À adapter selon votre cluster (standard, nfs-client, etc.)

