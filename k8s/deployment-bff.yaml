apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-deploiement
  namespace: paytogether
  labels:
    app: bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
      annotations:
        # Annotations pour que Prometheus découvre et scrape ce pod
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: bff
          image: docker.io/14152021/dealtogether:bff-v1.0.53
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Configuration API Auth (service connect)
            - name: API_AUTH_URL
              value: "http://connect-service:8092"
            # Configuration Elasticsearch (service ClusterIP)
            - name: ELASTICSEARCH_URIS
              value: "http://elasticsearch-service:9200"
