apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elasticsearch-ingress
  namespace: paytogether
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Authentification basique avec NGINX
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: elasticsearch-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Elasticsearch Admin - Authentication Required"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - elasticsearch.dealtogether.ca
      secretName: elasticsearch-tls
  rules:
    - host: elasticsearch.dealtogether.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elasticsearch-service
                port:
                  number: 9200



