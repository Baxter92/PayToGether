apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-deployment
  namespace: paytogether
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      # Note: initContainer sysctl retiré car nécessite des privilèges root
      # Sur K3s, vm.max_map_count doit être configuré sur le nœud hôte directement
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          env:
            # Mode single-node pour développement
            - name: discovery.type
              value: single-node
            # Désactiver la sécurité pour simplifier le dev
            - name: xpack.security.enabled
              value: "false"
            # Limiter la RAM utilisée
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            # Désactiver le ML (machine learning) pour économiser des ressources
            - name: xpack.ml.enabled
              value: "false"
            # Nom du cluster
            - name: cluster.name
              value: paytogether-elasticsearch
            # Nom du nœud
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: elasticsearch-pvc

