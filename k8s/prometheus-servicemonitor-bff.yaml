apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bff-servicemonitor
  namespace: paytogether
  labels:
    app: bff
    release: prometheus
spec:
  selector:
    matchLabels:
      app: bff
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s

