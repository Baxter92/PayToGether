<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
    <!-- Fond -->
    <circle cx="250" cy="250" r="245" fill="#0b1c2c"/>

    <!-- Cercle externe -->
    <circle cx="250" cy="250" r="230" fill="none" stroke="#e63946" stroke-width="10"/>
    <circle cx="250" cy="250" r="210" fill="none" stroke="#f1faee" stroke-width="6"/>

    <!-- Bande centrale -->
    <rect x="80" y="200" width="340" height="100" fill="#e63946" rx="10"/>

    <!-- Texte -->
    <text x="250" y="235" text-anchor="middle" font-size="40" fill="#f1faee" font-family="Arial" font-weight="bold">
        DEAL
    </text>
    <text x="250" y="285" text-anchor="middle" font-size="40" fill="#f1faee" font-family="Arial" font-weight="bold">
        TOGETHER
    </text>

    <!-- Icône poignée de main simplifiée -->
    <g transform="translate(250, 330) scale(1.2)">
        <path d="M -60 0 Q -30 -30 0 0 Q 30 30 60 0" stroke="#f1faee" stroke-width="8" fill="none"/>
        <circle cx="-20" cy="0" r="6" fill="#f1faee"/>
        <circle cx="20" cy="0" r="6" fill="#f1faee"/>
    </g>
</svg>