# Configuration principale Spring Boot
spring.application.name=paytogether-bff
app.frontend.base-url= ${APP_FRONTEND_BASE_URL:https://dealtogether.ca}

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuration du pool de connexions HikariCP (optimisation pour Virtual Threads)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuration Tomcat avec Virtual Threads (Java 21)
# Active les Virtual Threads pour gerer les requetes HTTP
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000
# Timeout des connexions inactives (ms) - ferme les connexions qui ne repondent plus
server.tomcat.connection-timeout=60000

# -------------------------------------------------------
# Timeouts RestClient (appels vers services externes : Keycloak, etc.)
# -------------------------------------------------------
# Delai max pour etablir la connexion TCP (ms)
restclient.timeout.connect=3000
# Delai max pour recevoir la reponse (lecture socket + traitement distant) (ms)
restclient.timeout.read=10000
# Delai max pour obtenir une connexion depuis le pool (ms)
restclient.timeout.connection-request=5000

# Configuration Flyway (migrations SQL) - DESACTIVE
spring.flyway.enabled=false

# Configuration DataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:31.97.132.132}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ZhKdrpgibRkzWodAw6rRABraPdXRcbpW}

