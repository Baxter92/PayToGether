# -------------------------------------------------------
# Redis Cache externe
# -------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:redis-service}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.cache.type=redis

# TTL par cache (secondes) ? modifiable sans recompilation
cache.ttl.categories=1800
cache.ttl.deals=1800
cache.ttl.deal=1800
cache.ttl.publicites=1800
cache.ttl.utilisateur=600
cache.ttl.commentaires=180

# Configuration Actuator & Prometheus
# Exposer tous les endpoints actuator (health, metrics, prometheus, info, etc.)
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always

# Personnalisation des metriques HTTP
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Service Level Objectives pour les metriques HTTP (en Duration format)
management.observations.http.server.requests.name=http.server.requests

# Tags personnalises pour les metriques
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=production
cache.ttl.admin-token=82800
# Cron batch expiration des deals (toutes les 15 minutes)
deal.expiration.cron=0 */15 * * * *
