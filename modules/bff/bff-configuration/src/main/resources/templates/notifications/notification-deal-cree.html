<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouveau deal créé</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #1b79e4 0%, #019cca 100%); color: white; padding: 30px; text-align: center; }
        .content { padding: 40px 30px; }
        .button { display: inline-block; padding: 15px 40px; background: linear-gradient(135deg, #1b79e4 0%, #019cca 100%); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 20px 0; }
        .footer { background: #f8f9fa; padding: 20px 30px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ✅ Logo DealTogether -->
        <div th:replace="~{fragments/logo :: logo}"></div>

        <div class="header"><h1>🎉 Nouveau deal créé</h1></div>
        <div class="content">
            <p>Bonjour <strong th:text="${prenom}">Prénom</strong> <strong th:text="${nom}">Nom</strong>,</p>
            <p>Votre deal a été créé avec succès !</p>
            <p><strong>Titre :</strong> <span th:text="${titreDeal}">Deal</span></p>
            <p><strong>Description :</strong> <span th:text="${descriptionDeal}">Description du Deal</span></p>
            <p><strong>Prix par part :</strong> <span th:text="${prixDealPart}">0</span> CAD</p>
            <p><strong>Prix total :</strong> <span th:text="${prixDeal}">0</span> CAD</p>
            <p><strong>Nombre de participants :</strong> <span th:text="${nbParticipants}">0</span></p>
            <p><strong>Date de création :</strong> <span th:text="${dateCreation}">date</span></p>
            <div style="text-align: center;"><a th:href="${lienDeal}" class="button">Voir mon deal</a></div>
        </div>
        <div class="footer"><p>© 2026 DealToGether - Tous droits réservés</p></div>
    </div>
</body>
</html>
