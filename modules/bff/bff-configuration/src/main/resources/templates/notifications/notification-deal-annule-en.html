<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deal Cancelled</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; padding: 30px; text-align: center; }
        .content { padding: 40px 30px; }
        .button { display: inline-block; padding: 15px 40px; background: linear-gradient(135deg, #1b79e4 0%, #019cca 100%); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 20px 0; }
        .footer { background: #f8f9fa; padding: 20px 30px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>❌ Deal Cancelled</h1></div>
        <div class="content">
            <p>Hello <strong th:text="${prenom}">First Name</strong> <strong th:text="${nom}">Last Name</strong>,</p>
            <p>We inform you that the following deal has been cancelled:</p>
            <p><strong>Title:</strong> <span th:text="${titreDeal}">Deal</span></p>
            <p><strong>Reason:</strong> <span th:text="${raisonAnnulation}">Reason</span></p>
            <p><strong>Cancellation date:</strong> <span th:text="${dateAnnulation}">date</span></p>
            <p>If you have any questions, please contact our support.</p>
        </div>
        <div class="footer"><p>© 2026 DealToGether - All rights reserved</p></div>
    </div>
</body>
</html>
