<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mise à jour de compte</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); color: white; padding: 30px; text-align: center; }
        .content { padding: 40px 30px; }
        .footer { background: #f8f9fa; padding: 20px 30px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>📝 Mise à jour de compte</h1></div>
        <div class="content">
            <p>Bonjour <strong th:text="${prenom}">Prénom</strong> <strong th:text="${nom}">Nom</strong>,</p>
            <p>Votre compte PayToGether a été mis à jour le <span th:text="${dateMiseAJour}">date</span>.</p>
            <p><strong>Modifications effectuées :</strong></p>
            <p th:text="${modifications}">modifications</p>
            <p>Si vous n'êtes pas à l'origine de ces modifications, contactez immédiatement notre support.</p>
        </div>
        <div class="footer"><p>© 2026 PayToGether - Tous droits réservés</p></div>
    </div>
</body>
</html>
