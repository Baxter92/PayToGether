# Configuration des tests d'intégration avec WireMock et Testcontainers
spring.application.name=PayTogether-Test

# Datasource H2 en mémoire pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate pour H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Désactiver Flyway pour les tests (on utilise ddl-auto=create-drop)
spring.flyway.enabled=false
spring.liquibase.enabled=false

# Désactiver Elasticsearch pour les tests
spring.data.elasticsearch.repositories.enabled=false
spring.elasticsearch.uris=http://localhost:9200
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration

# MinIO (utilisera WireMock en tests)
minio.endpoint=http://localhost:${wiremock.server.port}
minio.bucket.name=test-bucket
minio.access.key=testkey
minio.secret.key=testsecret
minio.presigned.url.expiration=3600

# Square Payment (utilisera WireMock en tests)
square.access.token=test_access_token
square.location.id=test_location_123
square.environment=sandbox
square.base.url=http://localhost:${wiremock.server.port}

# APIs externes (WireMock)
api.auth.url=http://localhost:${wiremock.server.port}
api.paiement.url=http://localhost:${wiremock.server.port}

# Désactiver l'authentification JWT pour les tests
jwt.enabled=false
spring.security.enabled=false

# Logging
logging.level.com.ulr.paytogether=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Event dispatcher - Configuration de retry
event.retry.maxAttempts=3
event.retry.backoffDelay=100
event.retry.maxBackoffDelay=1000
event.retry.multiplier=1.5

# Email configuration (mock pour les tests)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
